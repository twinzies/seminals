<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics Knowledge Graph</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #04060f;
    --panel: #090d1a;
    --border: #1a2040;
    --text: #c8d4f0;
    --muted: #4a5580;
    --accent: #00ffe5;

    --classical:    #f9a825;
    --quantum:      #00ffe5;
    --em:           #e040fb;
    --thermo:       #ff5722;
    --relativity:   #69f0ae;
    --math:         #90caf9;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
    z-index: 10;
  }

  header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
  }

  header p {
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.7rem;
    color: var(--muted);
    cursor: pointer;
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid transparent;
    transition: all 0.2s;
    user-select: none;
  }
  .legend-item:hover { border-color: var(--border); color: var(--text); }
  .legend-item.active { border-color: currentColor; }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  #graph-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  svg {
    width: 100%;
    height: 100%;
  }

  .link {
    stroke: #1e2a50;
    stroke-opacity: 0.6;
    stroke-width: 1.2;
    transition: stroke-opacity 0.3s;
  }
  .link.highlighted { stroke-opacity: 1; stroke-width: 2; }
  .link.faded { stroke-opacity: 0.05; }

  /* Paper-derived edge */
  .link.paper-derived {
    stroke: #ffb300;
    stroke-opacity: 0.85;
    stroke-width: 2.2;
    stroke-dasharray: 7 4;
    animation: dash-flow 1.8s linear infinite;
    filter: drop-shadow(0 0 4px #ffb30088);
  }
  .link.paper-derived.faded {
    stroke-opacity: 0.06;
    filter: none;
    animation: none;
  }
  .link.paper-derived.highlighted {
    stroke-opacity: 1;
    stroke-width: 3;
    filter: drop-shadow(0 0 8px #ffb300cc);
  }
  @keyframes dash-flow {
    from { stroke-dashoffset: 22; }
    to   { stroke-dashoffset: 0; }
  }

  /* Paper-derived legend pill */
  .paper-legend {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.7rem;
    color: #ffb300;
    font-family: 'Space Mono', monospace;
    padding: 3px 10px;
    border: 1px solid #ffb30055;
    border-radius: 20px;
    background: #ffb30011;
    margin-left: 10px;
  }
  .paper-legend-line {
    width: 28px;
    height: 2px;
    background: repeating-linear-gradient(
      90deg, #ffb300 0px, #ffb300 7px, transparent 7px, transparent 11px
    );
  }

  .node circle {
    stroke-width: 2;
    cursor: pointer;
    transition: r 0.2s;
  }

  .node text {
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    fill: var(--text);
    pointer-events: none;
    text-anchor: middle;
    dominant-baseline: central;
  }
  .node text.label-outer {
    font-size: 10px;
    fill: var(--muted);
  }

  .node.faded circle { opacity: 0.08; }
  .node.faded text  { opacity: 0.05; }

  /* Tooltip */
  #tooltip {
    position: absolute;
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 14px 16px;
    border-radius: 6px;
    max-width: 280px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 100;
    font-size: 0.82rem;
    line-height: 1.6;
  }
  #tooltip.visible { opacity: 1; }
  #tooltip h3 {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    margin-bottom: 6px;
    color: var(--accent);
  }
  #tooltip .domain-badge {
    display: inline-block;
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 20px;
    margin-bottom: 8px;
    font-weight: 600;
    opacity: 0.85;
  }
  #tooltip p { color: var(--muted); font-size: 0.78rem; }
  #tooltip .connects {
    margin-top: 8px;
    font-size: 0.72rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }
  #tooltip .connects span {
    color: var(--text);
    opacity: 0.7;
  }

  /* Controls */
  .controls {
    position: absolute;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px; height: 36px;
    border-radius: 6px;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }

  .hint {
    position: absolute;
    bottom: 20px;
    left: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    line-height: 1.8;
  }

  /* Star bg */
  .star { fill: white; }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
</style>
</head>

  },

  {
    source: "Wave-Particle Duality",

  // Note: Wave-Particle Duality → Schrödinger Equation edge now attributed to de Broglie above
  // (Schrödinger Paper I opens by citing de Broglie as the starting point)

  {

    passage: "\"We know that the Hamilton-Jacobi equation... corresponds to the equation of geometrical optics... We seek a wave equation which bears the same relation to the mechanical fundamental equations as the equation of wave optics bears to that of geometrical optics.\"",
    note: "Schrödinger derives his equation by substituting ψ = exp(iS/ℏ) into the Hamilton-Jacobi equation and demanding that ψ satisfies a linear wave equation. The Schrödinger equation is literally the Hamilton-Jacobi equation rewritten in wave form — the mathematical origin is explicit on pages 2–4 of Paper I."
  },

  // Paper I: Hydrogen Atom solved as first validation of the equation
  {
    source: "Hydrogen Atom",
    target: "Schrödinger Equation",
    paperDerived: true,
    relType: "FIRST_APPLICATION_OF",
    citation: "Schrödinger, E. (1926). Quantisierung als Eigenwertproblem I. Annalen der Physik, 79, 361–376. [Collected Papers, p.5–10]",
    passage: "\"As a first example I will take the hydrogen atom... the eigenvalues of this boundary-value problem are found to be E_n = -me⁴/2ℏ²n², in complete agreement with Balmer's formula.\"",
    note: "Paper I is structured so that the hydrogen atom is the proof-of-concept. Schrödinger solves the eigenvalue problem for the Coulomb potential and recovers the correct spectral series, which he presents as the primary validation of his equation. This is not an application added later — it is the founding example."

  // Paper II: Perturbation Theory developed directly from the wave equation
  {

    paperDerived: true,

    citation: "Schrödinger, E. (1926). Quantisierung als Eigenwertproblem II. Annalen der Physik, 79, 489–527. [Collected Papers, p.13–40]",
    passage: "\"We add a small perturbation λV' to the potential... and expand both the eigenfunction ψ and eigenvalue E in powers of λ: ψ = ψ₀ + λψ₁ + λ²ψ₂ + ..., E = E₀ + λE₁ + λ²E₂ + ...\"",
    note: "Schrödinger invents wave-mechanical perturbation theory in Paper II as a direct method for solving the wave equation when exact solutions are unavailable. The modern perturbation theory used throughout quantum mechanics descends directly from this paper."

    note: "Schrödinger solves the harmonic oscillator in Paper II and explicitly identifies the zero-point energy ½hν as a direct consequence of the wave equation. This is the founding derivation of the quantum harmonic oscillator energy spectrum."

  {

  {

    citation: "Schrödinger, E. (1926). Über das Verhältnis... [Collected Papers, p.48–52]",
    passage: "\"The expansion of an arbitrary function in terms of the eigenfunctions ψ_n is entirely analogous to a Fourier expansion... the eigenfunctions play the role of the harmonic functions sin and cos.\"",
    note: "Schrödinger explicitly identifies the eigenfunction expansion as a generalised Fourier decomposition in Hilbert space. This is the direct textual basis for the deep connection between Fourier analysis and the mathematical structure of the Schrödinger equation — it is Schrödinger's own framing, not a later pedagogical analogy."
  },
];

// ── LEGEND ────────────────────────────────────────────────────────────────────
const legendEl = document.getElementById("legend");
const activeFilters = new Set(Object.keys(DOMAINS));

Object.entries(DOMAINS).forEach(([key, val]) => {
  const item = document.createElement("div");
  item.className = "legend-item active";
  item.style.color = val.color;
  item.innerHTML = `<span class="legend-dot" style="background:${val.color}"></span>${val.label}`;
  item.addEventListener("click", () => {
    if (activeFilters.has(key)) {
      activeFilters.delete(key);
      item.classList.remove("active");
    } else {
      activeFilters.add(key);
      item.classList.add("active");
    }
    applyFilter();
  });
  legendEl.appendChild(item);
});

// ── D3 SETUP ──────────────────────────────────────────────────────────────────
const svg = d3.select("#svg");
const container = document.getElementById("graph-container");

let width  = container.clientWidth;
let height = container.clientHeight;

// Star background
const bgGroup = svg.append("g").attr("class", "bg-stars");
for (let i = 0; i < 180; i++) {
  bgGroup.append("circle")
    .attr("class", "star")
    .attr("cx", Math.random() * width)
    .attr("cy", Math.random() * height)
    .attr("r", Math.random() * 1.2)
    .attr("opacity", Math.random() * 0.5 + 0.1);
}

const g = svg.append("g");

// Zoom
const zoom = d3.zoom()
  .scaleExtent([0.2, 4])
  .on("zoom", e => g.attr("transform", e.transform));
svg.call(zoom);

document.getElementById("zoom-in").onclick  = () => svg.transition().call(zoom.scaleBy, 1.4);
document.getElementById("zoom-out").onclick = () => svg.transition().call(zoom.scaleBy, 0.7);
document.getElementById("reset").onclick    = () => svg.transition().call(zoom.transform, d3.zoomIdentity);

// Simulation — feed ALL links for physics
const simulation = d3.forceSimulation(nodes)
  .force("link",   d3.forceLink(links).id(d => d.id).distance(d => 100).strength(0.4))
  .force("charge", d3.forceManyBody().strength(-320))
  .force("center", d3.forceCenter(width / 2, height / 2))
  .force("collision", d3.forceCollide().radius(d => d.size * 1.7 + 10));

// Links — split into normal and paper-derived
const normalLinks = links.filter(l => !l.paperDerived);
const paperLinks  = links.filter(l =>  l.paperDerived);

const linkSel = g.append("g").attr("class","links-normal")
  .selectAll("line").data(normalLinks).join("line").attr("class", "link");

const paperLinkSel = g.append("g").attr("class","links-paper")
  .selectAll("line").data(paperLinks).join("line")
  .attr("class", "link paper-derived");

// Nodes
const nodeSel = g.append("g").selectAll("g")
  .data(nodes).join("g")
  .attr("class", "node")
  .call(d3.drag()
    .on("start", (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on("drag",  (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on("end",   (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
  );

nodeSel.append("circle")
  .attr("r", d => d.size * 1.7)
  .attr("fill", d => DOMAINS[d.domain].color + "22")
  .attr("stroke", d => DOMAINS[d.domain].color)
  .attr("stroke-width", d => d.size > 18 ? 2.5 : 1.8);

// Label inside nodes — wrap to fit within circle radius
nodeSel.each(function(d) {
  const el = d3.select(this);
  const r = d.size * 1.7;
  const words = d.id.split(" ");

  // Build wrapped lines: max chars per line scales with radius
  const maxChars = Math.floor(r / 4.2);
  const lines = [];
  let cur = [];
  words.forEach(w => {
    const candidate = [...cur, w].join(" ");
    if (candidate.length > maxChars && cur.length > 0) {
      lines.push(cur.join(" "));
      cur = [w];
    } else {
      cur.push(w);
    }
  });
  if (cur.length) lines.push(cur.join(" "));

  const fontSize = r > 32 ? 11 : r > 24 ? 10 : 9;
  const lineH = fontSize + 3;
  const totalH = lines.length * lineH;

  lines.forEach((line, i) => {
    el.append("text")
      .text(line)
      .attr("dy", -totalH / 2 + i * lineH + lineH * 0.7)
      .attr("text-anchor", "middle")
      .style("font-size", fontSize + "px")
      .style("font-weight", "600")
      .style("fill", DOMAINS[d.domain].color)
      .style("pointer-events", "none");
  });

  // Year badge — only for sourced nodes
  if (d.year) {
    const badgeR = 10;
    const bx = r * 0.62;
    const by = -r * 0.62;
    el.append("circle")
      .attr("cx", bx).attr("cy", by)
      .attr("r", badgeR)
      .attr("fill", "#0a0a1a")
      .attr("stroke", DOMAINS[d.domain].color)
      .attr("stroke-width", 1.2)
      .style("pointer-events", "none");
    el.append("text")
      .text(d.year)
      .attr("x", bx).attr("y", by)
      .attr("dy", "0.35em")
      .attr("text-anchor", "middle")
      .style("font-size", "7px")
      .style("font-weight", "700")
      .style("fill", DOMAINS[d.domain].color)
      .style("pointer-events", "none");
  }
});

// Tick
simulation.on("tick", () => {
  const moveLine = sel => sel
    .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  moveLine(linkSel);
  moveLine(paperLinkSel);
  nodeSel.attr("transform", d => `translate(${d.x},${d.y})`);
});

// ── TOOLTIP & HOVER ───────────────────────────────────────────────────────────
const tooltip = document.getElementById("tooltip");
let hoveredId = null;

function getNeighbors(nodeId) {
  const neighbors = new Set();
  links.forEach(l => {
    const s = typeof l.source === "object" ? l.source.id : l.source;
    const t = typeof l.target === "object" ? l.target.id : l.target;
    if (s === nodeId) neighbors.add(t);
    if (t === nodeId) neighbors.add(s);
  });
  return neighbors;
}

function getPaperLinks(nodeId) {
  return paperLinks.filter(l => {
    const s = typeof l.source === "object" ? l.source.id : l.source;
    const t = typeof l.target === "object" ? l.target.id : l.target;
    return s === nodeId || t === nodeId;
  });
}

// Paper-link tooltip (separate, amber-styled)
const paperTooltip = document.createElement("div");
paperTooltip.id = "paper-tooltip";
paperTooltip.style.cssText = `
  position:absolute; background:#0d0f1a; border:1px solid #ffb30066;
  border-left:3px solid #ffb300; padding:14px 16px; border-radius:6px;
  max-width:320px; pointer-events:none; opacity:0; transition:opacity 0.2s;
  z-index:200; font-size:0.78rem; line-height:1.6; color:#c8d4f0;
`;
document.getElementById("graph-container").appendChild(paperTooltip);

nodeSel
  .on("mouseover", function(event, d) {
    hoveredId = d.id;
    const neighbors = getNeighbors(d.id);
    const myPaperLinks = getPaperLinks(d.id);

    nodeSel.classed("faded", n => n.id !== d.id && !neighbors.has(n.id));

    linkSel
      .classed("highlighted", l => { const s = typeof l.source==="object"?l.source.id:l.source; const t = typeof l.target==="object"?l.target.id:l.target; return s===d.id||t===d.id; })
      .classed("faded",       l => { const s = typeof l.source==="object"?l.source.id:l.source; const t = typeof l.target==="object"?l.target.id:l.target; return s!==d.id&&t!==d.id; });

    paperLinkSel
      .classed("highlighted", l => { const s = typeof l.source==="object"?l.source.id:l.source; const t = typeof l.target==="object"?l.target.id:l.target; return s===d.id||t===d.id; })
      .classed("faded",       l => { const s = typeof l.source==="object"?l.source.id:l.source; const t = typeof l.target==="object"?l.target.id:l.target; return s!==d.id&&t!==d.id; });

    const dom = DOMAINS[d.domain];

    // If this node has a paper-derived edge, show citation panel too
    if (myPaperLinks.length > 0) {
      const pl = myPaperLinks[0];
      const otherEnd = (typeof pl.source==="object"?pl.source.id:pl.source) === d.id
        ? (typeof pl.target==="object"?pl.target.id:pl.target)
        : (typeof pl.source==="object"?pl.source.id:pl.source);
      paperTooltip.innerHTML = `
        <div style="font-family:'Space Mono',monospace;font-size:0.7rem;color:#ffb300;margin-bottom:6px;letter-spacing:0.08em">
          ◈ PAPER-DERIVED EDGE
        </div>
        <div style="font-size:0.8rem;font-weight:600;margin-bottom:4px">
          ${d.id} ↔ ${otherEnd}
        </div>
        <div style="font-size:0.7rem;color:#ffb300;opacity:0.8;margin-bottom:8px;font-style:italic">
          ${pl.relType}
        </div>
        <div style="font-size:0.72rem;color:#8892b0;margin-bottom:8px;border-left:2px solid #ffb30044;padding-left:8px;font-style:italic">
          ${pl.passage}
        </div>
        <div style="font-size:0.68rem;color:#556080;margin-bottom:6px">
          ${pl.note}
        </div>
        <div style="font-size:0.65rem;color:#ffb30099;font-family:'Space Mono',monospace;border-top:1px solid #ffb30022;padding-top:6px">
          📄 ${pl.citation}
        </div>
      `;
      paperTooltip.style.opacity = "1";
    } else {
      paperTooltip.style.opacity = "0";
    }

    tooltip.innerHTML = `
      <h3>${d.id}</h3>
      <span class="domain-badge" style="background:${dom.color}22;color:${dom.color};border:1px solid ${dom.color}55">${dom.label}</span>
      <p>${d.desc}</p>
      ${d.year ? `<div style="font-size:0.68rem;color:${dom.color};opacity:0.85;margin-bottom:6px;font-family:'Space Mono',monospace;border-left:2px solid ${dom.color}66;padding-left:8px">
        📄 First established: <strong>${d.year}</strong><br><span style="opacity:0.7">${d.paperSource}</span>
      </div>` : ''}
      <div class="connects">connects to: <span>${[...neighbors].join(", ") || "—"}</span></div>
    `;
    tooltip.style.borderLeftColor = dom.color;
    tooltip.classList.add("visible");
  })
  .on("mousemove", function(event) {
    const rect = container.getBoundingClientRect();
    let x = event.clientX - rect.left + 16;
    let y = event.clientY - rect.top  - 10;
    if (x + 290 > rect.width)  x = event.clientX - rect.left - 300;
    if (y + 200 > rect.height) y = event.clientY - rect.top  - 150;
    tooltip.style.left = x + "px";
    tooltip.style.top  = y + "px";
    // Paper tooltip appears offset below
    paperTooltip.style.left = x + "px";
    paperTooltip.style.top  = (y + 210) + "px";
    if (y + 210 + 240 > rect.height) {
      paperTooltip.style.top = (y - 260) + "px";
    }
  })
  .on("mouseout", function() {
    hoveredId = null;
    nodeSel.classed("faded", false);
    linkSel.classed("highlighted", false).classed("faded", false);
    paperLinkSel.classed("highlighted", false).classed("faded", false);
    tooltip.classList.remove("visible");
    paperTooltip.style.opacity = "0";
  });

// ── FILTER ────────────────────────────────────────────────────────────────────
function applyFilter() {
  nodeSel.style("display", d => activeFilters.has(d.domain) ? null : "none");
  const showLink = l => {
    const s = typeof l.source === "object" ? l.source : nodes.find(n => n.id === l.source);
    const t = typeof l.target === "object" ? l.target : nodes.find(n => n.id === l.target);
    return (s && t && activeFilters.has(s.domain) && activeFilters.has(t.domain)) ? null : "none";
  };
  linkSel.style("display", showLink);
  paperLinkSel.style("display", showLink);
  simulation.alpha(0.3).restart();
}

// ── RESIZE ────────────────────────────────────────────────────────────────────
window.addEventListener("resize", () => {
  width  = container.clientWidth;
  height = container.clientHeight;
  simulation.force("center", d3.forceCenter(width / 2, height / 2)).alpha(0.2).restart();
});
</script>
</body>
</html>
